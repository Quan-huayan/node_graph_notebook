name: node_graph_notebook
description: A concept-map based notebook application with node graph visualization, Markdown support, AI integration, and plugin system.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Markdown Support
  flutter_markdown: ^0.6.14
  markdown: ^7.1.1
  charcode: ^1.3.1

  # Flame Game Engine
  flame: ^1.10.0
  # flame_json is now included in flame
  vector_math: ^2.1.4

  # State Management
  provider: ^6.1.1
  flutter_hooks: ^0.20.0
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # File System
  path_provider: ^2.1.1
  path: ^1.8.3
  file_picker: ^6.1.1

  # Data & Serialization
  uuid: ^4.2.1
  json_annotation: ^4.8.1
  shared_preferences: ^2.2.2

  # Internationalization
  intl: ^0.18.0

  # AI Clients (Optional - requires API keys)
  # openai: ^6.0.0
  # anthropic_dart: ^1.0.0

  # HTTP & Network
  http: ^1.1.0

  # UI Components
  flutter_svg: ^2.0.7
  cached_network_image: ^3.2.3
  flutter_colorpicker: ^1.0.3

  # Utilities
  collection: ^1.18.0
  isolate: ^2.1.1
  crypto: ^3.0.3

  # Development Tools
  flutter_lints: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

  # Testing
  mockito: ^5.4.2
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - data/settings/

  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: fonts/CustomFont-Regular.ttf
  #       - asset: fonts/CustomFont-Bold.ttf
  #         weight: 700
